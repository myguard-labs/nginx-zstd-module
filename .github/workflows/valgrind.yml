name: Valgrind Memcheck

# Third-party actions are pinned to commit SHAs for supply-chain safety.
# This pin table is the canonical reference for ALL workflow files
# (build-test.yml, codeql.yml, security-scanners.yml, fuzzing.yml, valgrind.yml) —
# keep them consistent.
# actions/checkout@v4          -> 34e114876b0b11c390a56381ad16ebd13914f8d5
# actions/cache@v4             -> 0057852bfaa89a56745cba8c7296529d2fc39830
# actions/upload-artifact@v4   -> ea165f8d65b6e75b540449e92b4886f43607fa02
# actions/download-artifact@v4 -> d3f86a106a0bac45b974a628896c90dbdf5c8093

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.0"

on:
  schedule:
    # Monthly 1st 03:30 UTC — drives the slow Memcheck/valgrind soak.
    # Run monthly (not weekly) because a full valgrind soak is ~20-50x
    # slower than native. Catches uninitialized-value reads and leaks
    # that ASAN cannot (definedness tracking, --track-origins).
    - cron: "30 3 1 * *"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ── Build the nginx binary with debug symbols ────────────────────────
  #    Reuses the same build strategy as build-test.yml: -g3 -O0 with
  #    frame pointers for accurate valgrind origin tracking.
  build:
    name: Build (nginx 1.31.0)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-valgrind-build-${{ runner.os }}-build-essential-libzstd-libpcre2-zlib
          restore-keys: apt-valgrind-build-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libzstd-dev \
            libpcre2-dev \
            zlib1g-dev \
            ccache \
            wget

      - name: Set up ccache
        run: |
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"

      - name: Cache ccache objects
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.ccache
          key: ccache-valgrind-${{ runner.os }}-nginx-${{ env.NGINX_VERSION }}-${{ hashFiles('filter/*.c', 'static/*.c', '*.h', 'config') }}
          restore-keys: |
            ccache-valgrind-${{ runner.os }}-nginx-${{ env.NGINX_VERSION }}-
            ccache-valgrind-${{ runner.os }}-

      - name: Cache nginx source tarball
        id: nginx-tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: nginx-src-valgrind-${{ env.NGINX_VERSION }}

      - name: Download nginx source tarball
        if: steps.nginx-tarball.outputs.cache-hit != 'true'
        run: wget -q -O "nginx-${NGINX_VERSION}.tar.gz" "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"

      - name: Configure (full debug build)
        run: |
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"
          cd "nginx-${NGINX_VERSION}"
          # Full debug compile flags for valgrind accuracy:
          #   --with-debug          nginx debug logging (ngx_log_debug*)
          #   -g3                   max debug info incl. macro definitions
          #   -O0                   no optimisation — accurate line/var info
          #   -fno-omit-frame-pointer  reliable backtraces for origin tracking
          #   -funwind-tables       unwind info for crash backtraces
          #   -DNGX_DEBUG_PALLOC=1  pool-allocator debug bookkeeping
          ./configure \
            --with-compat \
            --with-debug \
            --with-threads \
            --with-file-aio \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_v3_module \
            --with-http_gzip_static_module \
            --with-http_realip_module \
            --with-http_sub_module \
            --with-http_addition_module \
            --with-http_stub_status_module \
            --with-http_auth_request_module \
            --with-cc-opt="-DZSTD_STATIC_LINKING_ONLY -DNGX_DEBUG_PALLOC=1 -g3 -O0 -fno-omit-frame-pointer -funwind-tables $(pkg-config --cflags libzstd zlib libpcre2-8)" \
            --with-ld-opt="$(pkg-config --libs libzstd zlib libpcre2-8)" \
            --add-module="$GITHUB_WORKSPACE"

      - name: Build
        run: |
          cd "nginx-${NGINX_VERSION}"
          make -j"$(nproc)"
          ccache -s || true
          echo "✓ nginx binary built with debug symbols"

      - name: Upload nginx binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nginx-binary-debug
          path: nginx-${{ env.NGINX_VERSION }}/objs/nginx
          retention-days: 1

  # ── Memcheck soak: sustained mixed-load under valgrind ────────────────
  #    Catches uninitialized-value reads and memory leaks that ASAN cannot.
  #    Uses the full --track-origins=yes for precise error localization.
  memcheck-soak:
    name: Memcheck soak (5 min, 4 concurrent)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: build

    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind zstd libzstd1 curl

      - name: Download nginx binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nginx-binary-debug
          path: nginx-bin

      - name: Set up nginx binary
        run: |
          chmod +x nginx-bin/nginx
          echo "✓ nginx binary ready: $(nginx-bin/nginx -V 2>&1 | head -1)"

      - name: Soak under valgrind Memcheck
        env:
          USE_VALGRIND: "1"
        run: |
          cd "$GITHUB_WORKSPACE"
          bash tools/soak.sh "$GITHUB_WORKSPACE/nginx-bin/nginx" 300 4

  # ── Direct Memcheck run with origin tracking ────────────────────────
  #    Single-worker, high-volume requests; catches definite leaks and
  #    uninitialized reads with full origin backtraces.
  memcheck-direct:
    name: Memcheck direct (origin tracking)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: build

    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind zstd libzstd1 curl

      - name: Download nginx binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nginx-binary-debug
          path: nginx-bin

      - name: Set up nginx binary
        run: chmod +x nginx-bin/nginx

      - name: Direct Memcheck run with origin tracking
        run: |
          set -u
          WORK="$(mktemp -d)"
          mkdir -p "$WORK/conf" "$WORK/logs" "$WORK/html"
          head -c 200000 /dev/urandom | base64 > "$WORK/html/payload"
          cat > "$WORK/conf/nginx.conf" <<'NGINX_EOF'
          daemon off;
          master_process off;
          error_log ERRORLOG;
          pid PIDFILE;
          events { worker_connections 64; }
          http {
              access_log off;
              zstd on;
              zstd_comp_level 9;
              zstd_min_length 1;
              zstd_types text/plain;
              server {
                  listen 127.0.0.1:18999;
                  location / { root ROOTDIR; }
              }
          }
          NGINX_EOF
          sed -i "s|ERRORLOG|$WORK/logs/error.log|" "$WORK/conf/nginx.conf"
          sed -i "s|PIDFILE|$WORK/nginx.pid|" "$WORK/conf/nginx.conf"
          sed -i "s|ROOTDIR|$WORK/html|" "$WORK/conf/nginx.conf"
          valgrind \
            --tool=memcheck \
            --leak-check=full \
            --show-leak-kinds=definite,indirect \
            --track-origins=yes \
            --error-exitcode=99 \
            --suppressions="$GITHUB_WORKSPACE/valgrind.suppress" \
            "$GITHUB_WORKSPACE/nginx-bin/nginx" -p "$WORK" \
            -c "$WORK/conf/nginx.conf" &
          VPID=$!
          for _ in $(seq 1 30); do
            curl -fsS -H 'Accept-Encoding: zstd' \
              http://127.0.0.1:18999/payload -o /dev/null && break
            sleep 1
          done
          for _ in $(seq 1 50); do
            curl -fsS -H 'Accept-Encoding: zstd' \
              http://127.0.0.1:18999/payload -o /dev/null || true
          done
          kill -TERM "$VPID" 2>/dev/null || true
          wait "$VPID"; RC=$?
          echo "valgrind exit code: $RC"
          if [ "$RC" -eq 99 ]; then
            echo "valgrind reported a memory error"
            exit 1
          fi
          echo "valgrind Memcheck clean (no errors, no definite leaks)"
