name: Build & Test

# Third-party actions are pinned to commit SHAs for supply-chain safety.
# This pin table is the canonical reference for ALL workflow files
# (build-test.yml, codeql.yml, security-scanners.yml, fuzzing.yml) —
# keep them consistent.
# actions/checkout@v4          -> 34e114876b0b11c390a56381ad16ebd13914f8d5
# actions/cache@v4             -> 0057852bfaa89a56745cba8c7296529d2fc39830
# actions/upload-artifact@v4   -> ea165f8d65b6e75b540449e92b4886f43607fa02
# actions/download-artifact@v4 -> d3f86a106a0bac45b974a628896c90dbdf5c8093
# github/codeql-action/*@v3    -> 458d36d7d4f47d0dd16ca424c1d3cda0060f1360

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Latest mainline nginx. This is the default build + the artifact the
  # full test/ASAN suite runs against. The build matrix additionally
  # compiles the module against Angie (the actively-developed nginx fork
  # this module also ships packages for).
  NGINX_VERSION: "1.31.0"

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly Monday 04:17 UTC — catches nginx API drift against new releases
    # even when nothing is pushed.
    - cron: "17 4 * * 1"
  workflow_dispatch: {}

# Cancel superseded runs on the same ref instead of piling up runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token. Jobs that need more request it explicitly.
permissions:
  contents: read

jobs:

  # ── Lint & static analysis — no nginx build, fully independent ────────────
  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Lint the workflow files themselves. actionlint validates GitHub
      # Actions expression contexts (e.g. "env is not allowed in a job
      # name:") that a plain YAML parser cannot catch — exactly the class
      # of error that previously took the whole pipeline down. Runs first
      # so a broken workflow fails fast and obviously.
      - name: Lint workflows (actionlint)
        run: |
          ACTIONLINT_VERSION=1.7.7
          curl -fsSL -o /tmp/actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          /tmp/actionlint -color "$GITHUB_WORKSPACE"/.github/workflows/*.yml
          echo "✓ actionlint: workflows valid"

      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-validation-${{ runner.os }}-shellcheck-cppcheck-clang-tools-nginx-dev
          restore-keys: apt-validation-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            shellcheck \
            cppcheck \
            clang-tools \
            python3 \
            nginx-dev

      - name: Validate tool scripts (syntax only)
        run: |
          cd "$GITHUB_WORKSPACE/tools"
          bash -n ci-build.sh
          echo "✓ All tool scripts: syntax OK"

      - name: Python tool validation
        run: |
          cd "$GITHUB_WORKSPACE/tools"
          python3 test_encoding.py --help | head -3
          echo "✓ Python tools validated"

      - name: Python unit tests (test harness self-checks)
        run: |
          cd "$GITHUB_WORKSPACE/tools"
          python3 -m unittest -v test_test_encoding test_test_package_artifact
          echo "✓ Python harness unit tests passed"

      - name: Shell script linting (shellcheck)
        run: |
          shellcheck "$GITHUB_WORKSPACE"/tools/*.sh || true
          echo "✓ shellcheck complete"

      - name: Discover nginx include paths
        run: |
          if [ -f /usr/include/nginx/ngx_config.h ]; then
            NGINX_INCLUDES="/usr/include/nginx"
          else
            CONFIG_H=$(dpkg -L nginx-dev 2>/dev/null | grep 'ngx_config.h' | head -1)
            if [ -n "$CONFIG_H" ]; then
              CONFIG_DIR=$(dirname "$CONFIG_H")
              NGINX_INCLUDES="$CONFIG_DIR"
              if [[ "$CONFIG_DIR" =~ /src/src/core$ ]]; then
                NGINX_SRC="${CONFIG_DIR%/src/src/core}/src"
              fi
            fi
          fi
          [ -z "$NGINX_INCLUDES" ] && NGINX_INCLUDES="/usr/include/nginx"
          echo "NGINX_INCLUDES=${NGINX_INCLUDES}" >> "$GITHUB_ENV"
          [ -n "$NGINX_SRC" ] && echo "NGINX_SRC=${NGINX_SRC}" >> "$GITHUB_ENV"

      - name: Cache nginx-dev generated headers
        id: nginx-dev-objs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /usr/share/nginx/src/objs
          key: nginx-dev-objs-${{ runner.os }}-${{ hashFiles('/var/lib/dpkg/info/nginx-dev.list') }}

      - name: Generate nginx build headers (for lint tools)
        if: steps.nginx-dev-objs.outputs.cache-hit != 'true'
        run: |
          cd /usr/share/nginx/src
          CC=gcc ./configure --with-compat --add-dynamic-module="$GITHUB_WORKSPACE" > /dev/null 2>&1 || true

      - name: Export nginx objs path
        run: echo "NGINX_OBJS=/usr/share/nginx/src/objs" >> "$GITHUB_ENV"

      - name: cppcheck (static analysis)
        run: |
          cppcheck --enable=all --error-exitcode=1 --suppress=missingIncludeSystem \
            "$GITHUB_WORKSPACE/filter/ngx_http_zstd_filter_module.c" \
            "$GITHUB_WORKSPACE/static/ngx_http_zstd_static_module.c" \
            2>&1 | tee cppcheck.log
          echo "✓ cppcheck complete"
        continue-on-error: true

      - name: clang static analyzer
        run: |
          INCLUDE_FLAGS="-I${NGINX_INCLUDES} -I/usr/include"
          [ -n "${NGINX_SRC}" ]  && INCLUDE_FLAGS="$INCLUDE_FLAGS -I${NGINX_SRC}"
          [ -n "${NGINX_OBJS}" ] && INCLUDE_FLAGS="$INCLUDE_FLAGS -I${NGINX_OBJS}"
          INCLUDE_FLAGS="$INCLUDE_FLAGS -I${NGINX_INCLUDES}/objs -I${NGINX_INCLUDES}/.."
          # INCLUDE_FLAGS is a list of -I flags that MUST word-split into
          # separate gcc arguments; quoting it would pass one bogus arg.
          # shellcheck disable=SC2086
          scan-build --status-bugs \
            gcc -c $INCLUDE_FLAGS \
            "$GITHUB_WORKSPACE/filter/ngx_http_zstd_filter_module.c" \
            2>&1 | tee clang-scan.log || echo "ℹ clang-scan: Analysis complete"

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lint-reports
          path: |
            ${{ github.workspace }}/cppcheck.log
            ${{ github.workspace }}/clang-scan.log
          retention-days: 7

  # ── Build the module against each supported server flavour ───────────────
  #    nginx mainline + Angie (the actively-developed nginx fork this module
  #    also ships packages for — see tools/test_package_artifact.py). Angie
  #    builds with the same ./configure --add-module interface; only the
  #    download host and tarball/dir names differ, hence the include matrix.
  build:
    name: Build (${{ matrix.flavor }} ${{ matrix.version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: nginx
            version: "1.31.0"
            url: "https://nginx.org/download/nginx-1.31.0.tar.gz"
            dir: "nginx-1.31.0"
          - flavor: angie
            version: "1.11.5"
            url: "https://download.angie.software/files/angie-1.11.5.tar.gz"
            dir: "angie-1.11.5"

    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-build-${{ runner.os }}-build-essential-libzstd-libpcre2-zlib
          restore-keys: apt-build-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libzstd-dev \
            libpcre2-dev \
            zlib1g-dev \
            ccache \
            wget

      - name: Set up ccache
        run: |
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"

      - name: Cache ccache objects
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.flavor }}-${{ matrix.version }}-${{ hashFiles('filter/*.c', 'static/*.c', '*.h', 'config') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.flavor }}-${{ matrix.version }}-
            ccache-${{ runner.os }}-

      - name: Cache server source tarball
        id: src-tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ matrix.dir }}.tar.gz
          key: src-${{ matrix.flavor }}-${{ matrix.version }}

      - name: Download server source tarball
        if: steps.src-tarball.outputs.cache-hit != 'true'
        run: wget -q -O "${{ matrix.dir }}.tar.gz" "${{ matrix.url }}"

      - name: Configure (full debug build)
        run: |
          tar -xzf "${{ matrix.dir }}.tar.gz"
          cd "${{ matrix.dir }}"
          # Full debug compile flags:
          #   --with-debug          nginx debug logging (ngx_log_debug*)
          #   -g3                   max debug info incl. macro definitions
          #   -O0                   no optimisation — accurate line/var info
          #   -fno-omit-frame-pointer  reliable backtraces under gdb/valgrind
          #   -funwind-tables       unwind info for crash backtraces
          #   -DNGX_DEBUG_PALLOC=1  pool-allocator debug bookkeeping
          # Extra HTTP modules the zstd filter realistically runs alongside,
          # so the module is exercised in a realistic nginx (not a stripped one):
          #   ssl, v2 (HTTP/2), gzip_static, realip, sub, addition, stub_status
          ./configure \
            --with-compat \
            --with-debug \
            --with-threads \
            --with-file-aio \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_v3_module \
            --with-http_gzip_static_module \
            --with-http_realip_module \
            --with-http_sub_module \
            --with-http_addition_module \
            --with-http_stub_status_module \
            --with-http_auth_request_module \
            --with-cc-opt="-DZSTD_STATIC_LINKING_ONLY -DNGX_DEBUG_PALLOC=1 -g3 -O0 -fno-omit-frame-pointer -funwind-tables $(pkg-config --cflags libzstd zlib libpcre2-8)" \
            --with-ld-opt="$(pkg-config --libs libzstd zlib libpcre2-8)" \
            --add-module="$GITHUB_WORKSPACE"

      - name: Strict compile of module sources (warnings as errors)
        run: |
          cd "${{ matrix.dir }}"
          NGINX_CFLAGS=$(awk '/^CFLAGS[[:space:]]*=/{sub(/^CFLAGS[[:space:]]*=[[:space:]]*/,""); print; exit}' objs/Makefile)
          ALL_INCS=$(awk '/^ALL_INCS[[:space:]]*=/{found=1} found{line=$0; sub(/^ALL_INCS[[:space:]]*=[[:space:]]*/,"",line); gsub(/\\$/, "", line); printf "%s ", line; if (!/\\$/) exit}' objs/Makefile)
          for src in \
            "$GITHUB_WORKSPACE/filter/ngx_http_zstd_filter_module.c" \
            "$GITHUB_WORKSPACE/static/ngx_http_zstd_static_module.c"; do
            echo "--- strict compile: $(basename "$src") ---"
            # NGINX_CFLAGS and ALL_INCS are flag lists that MUST word-split
            # into individual gcc arguments.
            # shellcheck disable=SC2086
            gcc -c -fPIC $NGINX_CFLAGS \
              -Wall -Wextra -Wshadow -Wstrict-aliasing \
              -Wunreachable-code -Wunused -Wwrite-strings -Werror \
              $ALL_INCS \
              "$src" -o "/tmp/$(basename "$src" .c).o"
          done
          echo "✓ All module sources compile cleanly with strict flags"

      - name: Build binary with module
        run: |
          cd "${{ matrix.dir }}"
          NGINX_CFLAGS=$(awk '/^CFLAGS[[:space:]]*=/{sub(/^CFLAGS[[:space:]]*=[[:space:]]*/,""); print; exit}' objs/Makefile)
          make -j"$(nproc)" modules \
            CFLAGS="$NGINX_CFLAGS -Wall -Wextra -Wshadow -Wstrict-aliasing \
                    -Wunreachable-code -Wunused -Werror"
          make -j"$(nproc)"
          ccache -s || true
          echo "✓ nginx binary built"

      - name: Verify built binary
        run: |
          ls -la "${{ matrix.dir }}/objs/${{ matrix.flavor }}"
          "${{ matrix.dir }}/objs/${{ matrix.flavor }}" -V 2>&1

      - name: Upload server binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-binary-${{ matrix.flavor }}-${{ matrix.version }}
          path: ${{ matrix.dir }}/objs/${{ matrix.flavor }}
          retention-days: 1

  # ── ASAN + UBSAN build — catches the lifetime/UB bugs in this module's
  #    history (per-request ctx, terminal-frame). Uses valgrind.suppress'd
  #    knowledge; ASAN is faster than valgrind for CI. ───────────────────────
  build-asan:
    name: Build ASAN+UBSAN
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libzstd-dev \
            libpcre2-dev zlib1g-dev wget

      - name: Cache nginx source tarball
        id: nginx-tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: nginx-src-${{ env.NGINX_VERSION }}

      - name: Download nginx source tarball
        if: steps.nginx-tarball.outputs.cache-hit != 'true'
        run: wget -q "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"

      - name: Configure & build nginx with ASAN + UBSAN
        run: |
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"
          cd "nginx-${NGINX_VERSION}"
          SAN="-fsanitize=address,undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -g3 -O1"
          ./configure \
            --with-compat \
            --with-debug \
            --with-cc-opt="-DZSTD_STATIC_LINKING_ONLY $SAN $(pkg-config --cflags libzstd zlib libpcre2-8)" \
            --with-ld-opt="$SAN $(pkg-config --libs libzstd zlib libpcre2-8)" \
            --add-module="$GITHUB_WORKSPACE"
          make -j"$(nproc)"
          echo "✓ ASAN+UBSAN nginx binary built"

      - name: Upload ASAN nginx binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nginx-binary-asan
          path: nginx-${{ env.NGINX_VERSION }}/objs/nginx
          retention-days: 1

  # ── Full test suite — runs against the mainline binary ────────────────────
  tests:
    # The job-level name: is evaluated before the env context is available,
    # so it cannot use ${{ env.NGINX_VERSION }} (GitHub rejects the whole
    # workflow file). Keep this literal in sync with NGINX_VERSION above.
    name: Tests (nginx 1.31.0 mainline)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-tests-${{ runner.os }}-libperl-cpanminus-libzstd1
          restore-keys: apt-tests-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libperl-dev \
            cpanminus \
            libzstd1 \
            python3 \
            python3-requests \
            zstd

      - name: Download nginx binary (mainline, from build matrix)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # The build matrix uploads server-binary-<flavor>-<version>; the
          # full Perl/Python suite runs against nginx mainline specifically.
          name: server-binary-nginx-${{ env.NGINX_VERSION }}
          path: nginx-bin

      - name: Set up nginx binary
        run: |
          chmod +x nginx-bin/nginx
          echo "TEST_NGINX_BINARY=$GITHUB_WORKSPACE/nginx-bin/nginx" >> "$GITHUB_ENV"
          echo "✓ nginx binary ready: $(nginx-bin/nginx -v 2>&1)"

      - name: Cache Perl modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/perl5
          key: perl-modules-${{ runner.os }}-Test-Nginx-Socket

      - name: Install Test::Nginx::Socket
        run: |
          cpanm -l ~/perl5 --notest Test::Nginx::Socket
          echo "PERL5LIB=$HOME/perl5/lib/perl5:$PERL5LIB" >> "$GITHUB_ENV"

      - name: Run filter module tests
        run: |
          export PERL5LIB="$HOME/perl5/lib/perl5:${PERL5LIB:-}"
          export TEST_NGINX_SERVROOT="/tmp/nginx-servroot-filter"
          mkdir -p "$TEST_NGINX_SERVROOT"
          cd "$GITHUB_WORKSPACE"
          perl t/00-filter.t 2>&1 | sed 's/^Error:/Err:/' | tee t/filter-tests.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "❌ Filter tests FAILED"; exit 1; fi
          echo "✓ Filter module: All tests passed"

      - name: Run static module tests
        run: |
          export PERL5LIB="$HOME/perl5/lib/perl5:${PERL5LIB:-}"
          export TEST_NGINX_SERVROOT="$GITHUB_WORKSPACE/t/servroot-static"
          mkdir -p "$TEST_NGINX_SERVROOT"
          touch -d @1541504307 "$GITHUB_WORKSPACE/t/suite/test" "$GITHUB_WORKSPACE/t/suite/test.zst"
          cd "$GITHUB_WORKSPACE"
          perl t/01-static.t 2>&1 | sed 's/^Error:/Err:/' | tee t/static-tests.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "❌ Static tests FAILED"; exit 1; fi
          echo "✓ Static module: All tests passed"

      - name: Run truncation smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" --port 18080
          echo "✓ Truncation smoke test passed"

      - name: Run Vary smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18081 --gzip-vary on --expect-vary
          echo "✓ Vary smoke test passed"

      - name: Run boundary-size smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18082 --fixture-lines 1900
          echo "✓ Boundary-size smoke test passed"

      - name: Run repeated-request smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18083 --request-count 2
          echo "✓ Repeated-request smoke test passed"

      - name: Run concurrent-request smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18084 --concurrent-requests 2
          echo "✓ Concurrent-request smoke test passed"

      - name: Run terminal-frame regression test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_terminal_frame.py --nginx-binary "$TEST_NGINX_BINARY" --port 18085
          echo "✓ Terminal-frame regression test passed"

      - name: Run proxy_buffering-off truncation regression (bug B)
        run: |
          cd "$GITHUB_WORKSPACE"
          # Reproduces the production trigger: zstd over an unbuffered
          # (proxy_buffering off) chunked, no-Content-Length upstream.
          # Decodes and byte-compares the full body across the
          # ZSTD_CStreamInSize buffer-boundary size matrix. Fails on a
          # module that forwards a zero-size buffer ("zero size buf in
          # writer" -> aborted/truncated response).
          python3 tools/test_proxy_unbuffered_truncation.py \
            --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18086 --backend-port 18087
          echo "✓ proxy_buffering-off truncation regression passed"

      - name: Run broad compression correctness matrix
        timeout-minutes: 12
        run: |
          cd "$GITHUB_WORKSPACE"
          # ~504 cells: {proxy-buffered, proxy-unbuffered, static}
          # x {incompressible, highly-compressible, css}
          # x {1, CStreamInSize +/-1, 200000, 1MiB}
          # x {zstd, gzip+zstd, gzip-only, identity} x repeat.
          # Every cell decodes per Content-Encoding and byte-compares
          # to origin, or asserts correct fallback. Catches the whole
          # truncation / zero-size-buf / livelock bug class across the
          # circumstances it has historically recurred in (a step-level
          # timeout makes a CPU-spin livelock a hard FAIL, not a hang).
          python3 tools/test_compression_matrix.py \
            --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18096 --backend-port 18097
          echo "✓ compression correctness matrix passed"

      - name: Test summary
        if: success()
        run: echo "✓ All Perl + Python end-to-end tests passed"

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-logs
          path: |
            ${{ github.workspace }}/t/filter-tests.log
            ${{ github.workspace }}/t/static-tests.log
          retention-days: 7

  # ── Smoke tests under ASAN+UBSAN — fails on any memory/UB error ───────────
  tests-asan:
    name: Tests ASAN+UBSAN
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-asan

    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-requests zstd libzstd1

      - name: Download ASAN nginx binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nginx-binary-asan
          path: nginx-bin

      - name: Set up nginx binary
        run: |
          chmod +x nginx-bin/nginx
          echo "TEST_NGINX_BINARY=$GITHUB_WORKSPACE/nginx-bin/nginx" >> "$GITHUB_ENV"

      - name: Run smoke tests under ASAN+UBSAN
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:strict_string_checks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" --port 18090
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" --port 18091 --fixture-lines 1900
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" --port 18092 --concurrent-requests 2
          python3 tools/test_terminal_frame.py --nginx-binary "$TEST_NGINX_BINARY" --port 18093
          python3 tools/test_proxy_unbuffered_truncation.py \
            --nginx-binary "$TEST_NGINX_BINARY" --port 18094 --backend-port 18095
          # Matrix under ASAN/UBSAN at repeat=1 (252 cells) — the
          # truncation/zero-size-buf/livelock class has UB+lifetime
          # history, so exercise the full circumstance matrix with
          # sanitizers, not just the happy path.
          python3 tools/test_compression_matrix.py \
            --nginx-binary "$TEST_NGINX_BINARY" --port 18096 \
            --backend-port 18097 --repeat 1
          echo "✓ All smoke tests clean under ASAN+UBSAN"

      - name: zstd_dict_file reload leak check (CDict lifecycle)
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cd "$GITHUB_WORKSPACE"
          bash tools/test_reload_leak.sh "$TEST_NGINX_BINARY" 5

  # ── Sustained mixed-load soak under ASAN+UBSAN ───────────────────────────
  #    Production-shaped load that single-shot tests do not give. Long, so
  #    it runs only on the weekly schedule and manual dispatch — never on
  #    the per-PR path.
  soak-asan:
    name: Soak ASAN+UBSAN
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-asan
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd libzstd1 curl

      - name: Download ASAN nginx binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nginx-binary-asan
          path: nginx-bin

      - name: Set up nginx binary
        run: chmod +x nginx-bin/nginx

      - name: Soak (10 min, 8 concurrent, mixed payloads) under ASAN+UBSAN
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cd "$GITHUB_WORKSPACE"
          bash tools/soak.sh "$GITHUB_WORKSPACE/nginx-bin/nginx" 600 8
